services:
  rag_api:
    build:
      context: ./ai-learning-support-rag-api
      dockerfile: Dockerfile
    env_file:
      - ./ai-learning-support-rag-api/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RAW_PDF_STORAGE_PATH=/app/data/raw_pdfs
      - EXTRACTED_IMAGE_STORAGE_PATH=/app/data/extracted_images
    volumes:
      - rag_pdfs:/app/data/raw_pdfs
      - rag_images:/app/data/extracted_images
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    command: >
      sh -c "
      mkdir -p /app/data/raw_pdfs /app/data/extracted_images &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  llm_api:
    build:
      context: ./llm_api
      dockerfile: Dockerfile
    env_file:
      - ./llm_api/.env
    environment:
      - RAG_API_BASE_URL=http://rag_api:8000/api/v1
    ports:
      - "8001:8001"
    depends_on:
      - rag_api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  rag_pdfs:
    driver: local
  rag_images:
    driver: local
