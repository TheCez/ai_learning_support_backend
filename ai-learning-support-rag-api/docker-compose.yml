version: '3.8'

services:
  fastapi:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    volumes:
      - ./data/raw_pdfs:/app/data/raw_pdfs
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RAW_PDF_STORAGE_PATH=/app/data/raw_pdfs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: